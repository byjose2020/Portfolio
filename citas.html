<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de citas</title>
    <link rel="stylesheet" href="style/citas.css">
    <link rel="stylesheet" href="style/footer.css">
</head>

<body>
    <div class="menu-container">
        <h2 class="menu-title">Menú de Citas</h2>

        <div class="buttons-group">
            <div class="btn-item">
                <a href="index.html"><img src="images/website.png" alt="Registrar"></a>
                <span>Hacer una cita</span>
            </div>
            <div class="btn-item">
                <img src="ruta-a-tu-icono-consultar.png" alt="Consultar">
                <span>Consultar</span>
            </div>
            <div class="btn-item">
                <img src="ruta-a-tu-icono-actualizar.png" alt="Actualizar">
                <span>Actualizar</span>
            </div>
            <div class="btn-item">
                <img src="ruta-a-tu-icono-borrar.png" alt="Borrar">
                <span>Borrar</span>
            </div>
        </div>
    </div>

    <div class="text-al">
        <h2>Registro de citas</h2>
    </div>
    <div class="menu-info">
        <div>
            <label class="lb-text" for="">Nombre del paciente</label>
            <input class="ib-inp" type="text">
        </div>
        <div>
            <label class="lb-text" for="">Numero Telefonico</label>
            <input class="ib-inp" type="number" id="num" name="num">
        </div>
        <div>
            <label class="lb-text" for="">Email</label>
            <input class="ib-inp" type="email" id="email" name="email">
        </div>
        <div>
            <label class="lb-text "  for="">Fecha de la cita</label>
            <input class="ib-inp lb-fecha" id="Fecha" type="date" name="Fecha">
        </div>
        <div>
            <label class="lb-text " for="">Horario de atencion</label>
            <input class="ib-inp lb-hora" type="time" id="hora" name="hora">
        </div>
        <div class="div-button">
            <button class="lb-button">
                Realizar Cita
            </button>
        </div>
    </div>
    <footer>
        <article id="contacto" class="art-foot">
            <h2>Contacto</h2>
            <section class="sec-foot">°Correo:Bro.Gramer00@gmail.com</section>
            <section class="sec-foot">°Nombre: José Ángel Chapellin Miranda</section>
            <section class="sec-foot">°Numero de contacto: +58-421-777.78.78</section>
        </article>
        <article class="solcial-reds">

            <a class="" href="https://www.instagram.com/"><img class="logos" src="images/logo-ig.jpg"></a>
            <a class="" href=""><img class="logos" src="images/logo-what.jpg"></a>
        </article>
</body>

</html>
